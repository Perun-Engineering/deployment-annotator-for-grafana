name: Semantic Release

on:
  workflow_run:
    workflows: ["Multi-Arch Build"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:

jobs:
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    # Only run if Multi-Arch Build succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new-release-published: ${{ steps.semantic.outputs.new_release_published }}
      new-release-version: ${{ steps.semantic.outputs.new_release_version }}
      new-release-git-tag: ${{ steps.semantic.outputs.new_release_git_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        with:
          semantic_version: 22
          extra_plugins: |
            @semantic-release/changelog@6
            @semantic-release/git@10
            @semantic-release/exec@6
            conventional-changelog-conventionalcommits@7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Release Artifacts
    needs: semantic-release
    if: needs.semantic-release.outputs.new-release-published == 'true'
    uses: ./.github/workflows/release.yml
    with:
      tag_name: ${{ needs.semantic-release.outputs.new-release-git-tag }}
      version: ${{ needs.semantic-release.outputs.new-release-version }}
    permissions:
      contents: write
      packages: write
      security-events: write
